name: school_attendance
description: School Attendance App - Odoo 19
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Networking
  dio: ^5.4.0
  permission_handler: ^11.0.1
  open_filex: ^4.3.2
  path_provider: ^2.1.1

  # State Management
  flutter_riverpod: ^2.5.1

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Cookie management for Dio on mobile
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8

  # UI
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true